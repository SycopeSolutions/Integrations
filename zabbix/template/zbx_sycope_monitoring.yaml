zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 5c4bf6e37439437cbf003b9d42418832
    name: Templates/Applications
  templates:
  - uuid: 14cd875fb21e4933b418863e9724c8d1
    template: Sycope Monitoring
    name: Sycope Monitoring
    description: "Monitors Sycope NTA/Security platform via REST API (NQL queries).\n\
      Requirements:\n  -\
      \ sycope_check.py in ExternalScripts dir\n  - /etc/zabbix/sycope.conf with SYCOPE_USER\
      \ and SYCOPE_PASSWORD\n  - Set macro {$SYCOPE_IP} to your Sycope appliance IP\n"
    groups:
    - name: Templates/Applications
    macros:
    - macro: '{$SYCOPE_IP}'
      value: 192.168.1.14
      description: Sycope appliance IP
    - macro: '{$SYCOPE_ALERT_MINUTES}'
      value: '15'
      description: Alert query lookback (minutes)
    - macro: '{$SYCOPE_ASSET_DAYS}'
      value: '7'
      description: Active services lookback (days)
    - macro: '{$SYCOPE_MATCHED_MINUTES}'
      value: '60'
      description: Matched IPs lookback (minutes)
    - macro: '{$SYCOPE_CONN_MINUTES}'
      value: '30'
      description: Connections lookback (minutes)
    - macro: '{$SYCOPE_ALERT_WARN}'
      value: '1'
      description: 'Warning threshold: alert count'
    - macro: '{$SYCOPE_ALERT_HIGH}'
      value: '5'
      description: 'High threshold: alert count'
    items:
    - uuid: bd17475f1227487ea58552e9f2a0c89f
      name: Visibility - Only SYN Client TCP Flag
      type: EXTERNAL
      key: sycope_check.py["{$SYCOPE_IP}","alert_count","{HOST.IP}","Only SYN Client
        TCP Flag","true","{$SYCOPE_ALERT_MINUTES}"]
      delay: 5m
      history: 7d
      trends: '0'
      value_type: FLOAT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.value
        error_handler: CUSTOM_VALUE
        error_handler_params: '-1'
      tags:
      - tag: component
        value: visibility
      - tag: source
        value: sycope
      triggers:
      - uuid: 93e1a759894b4fc98c05e8a34c0381c1
        expression: last(/Sycope Monitoring/sycope_check.py["{$SYCOPE_IP}","alert_count","{HOST.IP}","Only
          SYN Client TCP Flag","true","{$SYCOPE_ALERT_MINUTES}"])>{$SYCOPE_ALERT_HIGH}
        name: 'Sycope: Only SYN TCP Flag alerts HIGH on {HOST.NAME}'
        priority: HIGH
      - uuid: 734bc79f0c3f4bd7a2421b9f4021095d
        expression: last(/Sycope Monitoring/sycope_check.py["{$SYCOPE_IP}","alert_count","{HOST.IP}","Only
          SYN Client TCP Flag","true","{$SYCOPE_ALERT_MINUTES}"])>{$SYCOPE_ALERT_WARN}
          and last(/Sycope Monitoring/sycope_check.py["{$SYCOPE_IP}","alert_count","{HOST.IP}","Only
          SYN Client TCP Flag","true","{$SYCOPE_ALERT_MINUTES}"])<={$SYCOPE_ALERT_HIGH}
        name: 'Sycope: Only SYN TCP Flag alerts detected on {HOST.NAME}'
        priority: WARNING
    - uuid: 8535721701af4a7295daf0cb3b80c6be
      name: Visibility - Only SYN Client TCP Flag (detail)
      type: EXTERNAL
      key: sycope_check.py["{$SYCOPE_IP}","alert_count_msg","{HOST.IP}","Only SYN
        Client TCP Flag","true","{$SYCOPE_ALERT_MINUTES}"]
      delay: 5m
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.message
        error_handler: CUSTOM_VALUE
        error_handler_params: error
